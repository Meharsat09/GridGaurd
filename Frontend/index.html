<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Power Grid Failure Prediction</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Power Grid Failure Prediction</h1>
  <p>GNN-based Decision Support System</p>
</header>

<section class="controls">
  <label>Grid:</label>
  <select id="gridSelect">
    <option value="ieee14">IEEE 14</option>
    <option value="ieee30">IEEE 30</option>
    <option value="ieee118">IEEE 118</option>
    <option value="pglib118">PGLib 118</option>
    <option value="pglib300">PGLib 300</option>
  </select>

  <button onclick="loadGrid()">Run Prediction</button>

  <label><input type="checkbox" checked onchange="toggleEdges()"> Show Edges</label>
  <label><input type="checkbox" onchange="toggleArrows()"> Stress Arrows</label>

  <select onchange="switchView(this.value)">
    <option value="risk">Risk View</option>
    <option value="topology">Topology View</option>
  </select>
</section>

<!-- 🔥 SCENARIO PANEL -->
<section class="scenario">
  <h3>Scenario Stress Analysis</h3>

  <label>
    Load Stress:
    <span id="loadVal">1.2</span>x
  </label>
  <input type="range" id="loadSlider" min="1.0" max="1.5" step="0.05" value="1.2">

  <label>
    Voltage Drop:
    <span id="voltVal">0.95</span>
  </label>
  <input type="range" id="voltSlider" min="0.85" max="1.0" step="0.01" value="0.95">

  <button class="stressBtn" onclick="runScenario()">Run Scenario</button>
  <button class="stressBtn" onclick="resetScenario()">Reset to Baseline</button>
</section>

<main>
  <aside id="summary">
    <h2>Grid Summary</h2>
    <div id="gridSummary"></div>
    <p class="hint">
      <b>Tip:</b> Inner nodes → higher risk.<br>
      Arrows indicate stress influence (not power flow).
    </p>
  </aside>

  <section id="visualization">
    <canvas id="gridCanvas"></canvas>

    <div id="legend">
      <div><span class="dot low"></span> Low</div>
      <div><span class="dot medium"></span> Medium</div>
      <div><span class="dot high"></span> High</div>
      <div><span class="dot changed"></span> Newly Risky</div>
    </div>
  </section>
</main>

<section id="nodeDetails">
  <h2>Node Details</h2>
  <div id="nodeInfo">Click a node</div>
</section>

<script src="script.js?v=2"></script>
</body>
</html>
